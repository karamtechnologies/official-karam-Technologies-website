<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Karam Technologies</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    /* ===== Global Reset ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
    }

    /* ===== Navigation ===== */
    nav {
      border-radius: 5px;
      background: rgba(0, 0, 0, 0.7); /* semi-transparent nav */
      padding: 15px 0;
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 10;
    }

    .homeNav {
      text-decoration: none;
      color: #fff;
      font-weight: 600;
      font-size: 1rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: 0.3s;
    }

    .homeNav:hover {
      color: #00d4ff;
    }

    .v-line {
      width: 1px;
      height: 25px;
      background-color: #ccc;
    }

    /* ===== Background Image Section ===== */
    .imageBox {
      position: relative;
      min-height: 100vh;
      background: 
        linear-gradient(120deg, rgba(255, 255, 255, 0.15), rgba(255, 255, 255, 0.05)),
        url("css/images/asthetic.jpg") center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 1.5s ease;
    }

    /* ===== Overlay Shine Animation ===== */
    .imageBox::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        120deg,
        rgba(255, 255, 255, 0.2) 0%,
        rgba(255, 255, 255, 0.05) 50%,
        rgba(255, 255, 255, 0.2) 100%
      );
      animation: shine 5s linear infinite;
    }

    @keyframes shine {
      0% { background-position: -500px 0; }
      100% { background-position: 500px 0; }
    }

    /* ===== Coming Soon Box ===== */
    .coming-soon {
      position: relative;
      z-index: 2; /* above overlay */
      text-align: center;
      padding: 20px;
      color: #1a1a1a;
      animation: fadeUp 1s ease forwards;
    }

    .coming-box h2 {
      font-family: 'Playfair Display', serif;
      font-size: 2.4rem;
      letter-spacing: 0.04em;
      margin-bottom: 12px;
    }

    .coming-box p {
      font-family: 'Poppins', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 0.03em;
      max-width: 450px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* ===== Fade Up Animation ===== */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== Responsive Text ===== */
    @media(max-width: 768px) {
      .coming-box h2 { font-size: 2rem; }
      .coming-box p { font-size: 1rem; }
      .v-line { height: 20px; }
    }
  </style>
</head>

<body>
  <!-- Navigation -->
  <nav class="d-flex justify-content-center gap-4">
    <a href="index.html" class="homeNav">HOME</a>
    <div class="v-line"></div>
    <a href="index.html#contact" class="homeNav">CONTACT</a>
  </nav>

  <!-- Background Image Section -->
  <div class="imageBox">
    <section class="coming-soon">
      <div class="coming-box">
        <h2>Working in Progress!</h2>
        <p>Crafting excellence, Project Blogs are currently in progress — unveiling soon.</p>
      </div>
    </section>
  </div>
</body>
</html>
